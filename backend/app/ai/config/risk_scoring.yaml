severity_bands:
  NORMAL: [0, 19]
  ADVISORY: [20, 39]
  WARNING: [40, 59]
  HIGH: [60, 79]
  CRITICAL: [80, 100]

anomaly_contribution:
  low_threshold: 0.3
  low_contribution: 5.0
  moderate_threshold: 0.6
  moderate_contribution: 12.0
  high_threshold: 0.8
  high_contribution: 20.0

contextual_modifiers:
  max_total_modifier: 30.0
  worker_present: 5.0
  worker_count_multiplier: 2.0
  contractor_multiplier: 1.5
  active_hot_work: 10.0
  active_confined_space: 15.0
  isolation_incomplete: 15.0
  ventilation_degraded: 10.0
  safety_system_unavailable: 20.0
  adjacent_zone_propagation: 10.0
  emergency_exits_impaired: 15.0

evidence_families:
  gas: ["hydrocarbon", "h2s", "oxygen", "lel", "ppm", "pct"]
  pressure: ["pressure", "bar", "psi"]
  temperature: ["temperature", "celsius"]
  vibration: ["vibration", "hz", "mm"]
  ventilation: ["ventilation_health", "air_flow"]
  permit: ["hot_work_active", "confined_space_active", "line_break_active"]
  isolation: ["isolation_incomplete", "valve_position"]
  worker: ["worker_count", "contractor_present"]
  anomaly: ["anomaly_score"]

temporal:
  hysteresis_down_threshold: 5.0
  persistence_seconds_required: 10
  decay_rate_per_minute: 2.0
  cooldown_seconds: 300

confidence:
  base: 100.0
  stale_sensor_penalty: 10.0
  missing_sensor_penalty: 15.0
  invalid_sensor_penalty: 25.0
  minimum_confidence: 10.0
